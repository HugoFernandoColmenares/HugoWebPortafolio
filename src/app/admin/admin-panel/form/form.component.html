<form class="admin-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <header class="admin-form__header">
    <h2>{{ heading() }}</h2>
  </header>

  <div class="admin-form__grid">
    <div class="admin-form__field">
      <label for="user-full-name">{{ labels().fullName }}</label>
      <input pInputText id="user-full-name" formControlName="fullName" />
    </div>

    <div class="admin-form__field">
      <label for="user-email">{{ labels().email }}</label>
      <input pInputText id="user-email" type="email" formControlName="email" />
    </div>

    @if (isCreateMode()) {
      <div class="admin-form__field admin-form__field--full">
        <label for="user-password">{{ labels().password }}</label>
        <p-password
          inputId="user-password"
          formControlName="password"
          [toggleMask]="true"
        />
        <small>{{ labels().passwordHint }}</small>
      </div>
    }

    <div class="admin-form__field">
      <label for="user-role">{{ labels().role }}</label>
      <p-select
        inputId="user-role"
        formControlName="roleId"
        [options]="roleOptions()"
        optionLabel="label"
        optionValue="value"
      />
    </div>
  </div>

  <footer class="admin-form__actions">
    <p-button
      type="button"
      [label]="labels().cancel"
      severity="secondary"
      [outlined]="true"
      (onClick)="cancelForm.emit()"
    />

    @if (mode() !== 'view') {
      <p-button
        type="submit"
        [label]="labels().save"
        icon="pi pi-check"
        [loading]="loading()"
      />
    }
  </footer>
</form>
