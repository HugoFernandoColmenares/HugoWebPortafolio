<section class="profile">
  <header class="profile__header">
    <h1>{{ ts.t()['admin_profile_title'] }}</h1>
    <p>{{ ts.t()['admin_profile_subtitle'] }}</p>
  </header>

  @if (isLoading()) {
    <div class="profile__card profile__card--loading" aria-live="polite">
      <span class="profile__spinner"></span>
      <p>{{ ts.t()['admin_profile_loading'] }}</p>
    </div>
  } @else if (profile(); as user) {
    <app-profile-form
      [profile]="user"
      [labels]="formLabels()"
      [savingProfile]="savingProfile()"
      [savingPassword]="savingPassword()"
      (saveProfile)="onSaveProfile($event)"
      (changePassword)="onChangePassword($event)"
    />
  } @else {
    <div class="profile__card profile__card--empty" role="status">
      <p>{{ ts.t()['admin_profile_empty'] }}</p>
      @if (session()?.user?.email; as authEmail) {
        <p class="profile__muted">{{ authEmail }}</p>
      }
    </div>
  }
</section>
