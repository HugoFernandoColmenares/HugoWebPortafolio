<section class="auth-layout">
  <div class="auth-layout__panel auth-layout__panel--brand">
    <a routerLink="/" class="auth-layout__logo">
      <span>&lt;</span>Hugo<span class="gradient-text">.</span>dev<span>/&gt;</span>
    </a>
    <h2 class="auth-layout__headline">{{ ts.t()['auth_brand_title'] }}</h2>
    <p class="auth-layout__copy">{{ ts.t()['auth_brand_subtitle'] }}</p>
  </div>

  <div class="auth-layout__panel auth-layout__panel--form">
    @switch (activeView()) {
      @case ('login') {
        <app-login
          [loading]="loading()"
          [errorMessage]="errorMessage()"
          [labels]="loginLabels()"
          (submitLogin)="onLogin($event)"
          (goToRegister)="goToRegister()"
          (goToRecovery)="goToRecovery()"
        />
      }
      @case ('register') {
        <app-register
          [loading]="loading()"
          [errorMessage]="errorMessage()"
          [successMessage]="successMessage()"
          [labels]="registerLabels()"
          (submitRegister)="onRegister($event)"
          (goToLogin)="goToLogin()"
        />
      }
      @case ('recovery') {
        <app-recovery-password
          [mode]="recoveryMode()"
          [loading]="loading()"
          [errorMessage]="errorMessage()"
          [successMessage]="successMessage()"
          [labels]="recoveryLabels()"
          (submitRecovery)="onRecovery($event)"
          (submitPasswordUpdate)="onPasswordUpdate($event)"
          (goToLogin)="goToLogin()"
        />
      }
    }
  </div>
</section>
