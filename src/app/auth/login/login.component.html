<div class="auth-form">
  <div class="auth-form__header">
    <h1>{{ facade.loginLabels().title }}</h1>
    <p>{{ facade.loginLabels().subtitle }}</p>
  </div>

  @if (facade.errorMessage()) {
    <div class="auth-form__alert auth-form__alert--error" role="alert">
      {{ facade.errorMessage() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form__body">
    <div class="auth-form__group">
      <label class="auth-form__label" for="login-email">{{ facade.loginLabels().email }}</label>
      <input
        id="login-email"
        type="email"
        class="auth-form__input"
        [class.auth-form__input--error]="f.email.invalid && f.email.touched"
        formControlName="email"
        autocomplete="email"
      />
    </div>

    <div class="auth-form__group">
      <label class="auth-form__label" for="login-password">{{ facade.loginLabels().password }}</label>
      <input
        id="login-password"
        type="password"
        class="auth-form__input"
        [class.auth-form__input--error]="f.password.invalid && f.password.touched"
        formControlName="password"
        autocomplete="current-password"
      />
    </div>

    <button type="submit" class="auth-form__submit" [disabled]="facade.loading()">
      @if (facade.loading()) {
        <span class="auth-form__spinner"></span>
      }
      {{ facade.loginLabels().submit }}
    </button>
  </form>

  <div class="auth-form__footer">
    <button type="button" class="auth-form__link" (click)="facade.goToRecovery()">
      {{ facade.loginLabels().forgotPassword }}
    </button>
    <p>
      {{ facade.loginLabels().noAccount }}
      <button type="button" class="auth-form__link" (click)="facade.goToRegister()">
        {{ facade.loginLabels().register }}
      </button>
    </p>
  </div>
</div>
