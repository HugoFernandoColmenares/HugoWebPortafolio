<div class="auth-form">
  @if (facade.recoveryMode() === 'request') {
    <div class="auth-form__header">
      <h1>{{ facade.recoveryLabels().requestTitle }}</h1>
      <p>{{ facade.recoveryLabels().requestSubtitle }}</p>
    </div>

    <form [formGroup]="requestForm" (ngSubmit)="onRequestSubmit()" class="auth-form__body">
      <div class="auth-form__group">
        <label class="auth-form__label" for="recovery-email">{{ facade.recoveryLabels().email }}</label>
        <input
          id="recovery-email"
          type="email"
          class="auth-form__input"
          [class.auth-form__input--error]="rf.email.invalid && rf.email.touched"
          formControlName="email"
          autocomplete="email"
        />
      </div>

      <button type="submit" class="auth-form__submit" [disabled]="facade.loading()">
        @if (facade.loading()) {
          <span class="auth-form__spinner"></span>
        }
        {{ facade.recoveryLabels().submitRequest }}
      </button>
    </form>
  } @else {
    <div class="auth-form__header">
      <h1>{{ facade.recoveryLabels().updateTitle }}</h1>
      <p>{{ facade.recoveryLabels().updateSubtitle }}</p>
    </div>

    <form [formGroup]="updateForm" (ngSubmit)="onUpdateSubmit()" class="auth-form__body">
      <div class="auth-form__group">
        <label class="auth-form__label" for="recovery-password">{{ facade.recoveryLabels().password }}</label>
        <input
          id="recovery-password"
          type="password"
          class="auth-form__input"
          [class.auth-form__input--error]="uf.password.invalid && uf.password.touched"
          formControlName="password"
          autocomplete="new-password"
        />
      </div>

      <div class="auth-form__group">
        <label class="auth-form__label" for="recovery-confirm">{{ facade.recoveryLabels().confirmPassword }}</label>
        <input
          id="recovery-confirm"
          type="password"
          class="auth-form__input"
          [class.auth-form__input--error]="uf.confirmPassword.invalid && uf.confirmPassword.touched"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="auth-form__submit" [disabled]="facade.loading()">
        @if (facade.loading()) {
          <span class="auth-form__spinner"></span>
        }
        {{ facade.recoveryLabels().submitUpdate }}
      </button>
    </form>
  }

  <div class="auth-form__footer">
    <button type="button" class="auth-form__link" (click)="facade.goToLogin()">
      {{ facade.recoveryLabels().backToLogin }}
    </button>
  </div>
</div>
