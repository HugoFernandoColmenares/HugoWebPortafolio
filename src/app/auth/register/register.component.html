<div class="auth-form">
  <div class="auth-form__header">
    <h1>{{ facade.registerLabels().title }}</h1>
    <p>{{ facade.registerLabels().subtitle }}</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form__body">
    <div class="auth-form__group">
      <label class="auth-form__label" for="register-name">{{ facade.registerLabels().fullName }}</label>
      <input
        id="register-name"
        type="text"
        class="auth-form__input"
        [class.auth-form__input--error]="f.fullName.invalid && f.fullName.touched"
        formControlName="fullName"
        autocomplete="name"
      />
    </div>

    <div class="auth-form__group">
      <label class="auth-form__label" for="register-email">{{ facade.registerLabels().email }}</label>
      <input
        id="register-email"
        type="email"
        class="auth-form__input"
        [class.auth-form__input--error]="f.email.invalid && f.email.touched"
        formControlName="email"
        autocomplete="email"
      />
    </div>

    <div class="auth-form__group">
      <label class="auth-form__label" for="register-password">{{ facade.registerLabels().password }}</label>
      <div class="password-field">
        <input
          id="register-password"
          [type]="showPassword() ? 'text' : 'password'"
          class="auth-form__input"
          [class.auth-form__input--error]="f.password.invalid && f.password.touched"
          formControlName="password"
          autocomplete="new-password"
        />
        <button
          type="button"
          class="password-field__toggle"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword() ? facade.registerLabels().hidePassword : facade.registerLabels().showPassword"
        >
          @if (showPassword()) {
            <i class="pi pi-eye-slash" aria-hidden="true"></i>
          } @else {
            <i class="pi pi-eye" aria-hidden="true"></i>
          }
        </button>
      </div>
    </div>

    <div class="auth-form__group">
      <label class="auth-form__label" for="register-confirm">{{ facade.registerLabels().confirmPassword }}</label>
      <div class="password-field">
        <input
          id="register-confirm"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          class="auth-form__input"
          [class.auth-form__input--error]="f.confirmPassword.invalid && f.confirmPassword.touched"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
        <button
          type="button"
          class="password-field__toggle"
          (click)="toggleConfirmPassword()"
          [attr.aria-label]="showConfirmPassword() ? facade.registerLabels().hidePassword : facade.registerLabels().showPassword"
        >
          @if (showConfirmPassword()) {
            <i class="pi pi-eye-slash" aria-hidden="true"></i>
          } @else {
            <i class="pi pi-eye" aria-hidden="true"></i>
          }
        </button>
      </div>
    </div>

    <button type="submit" class="auth-form__submit" [disabled]="facade.loading()">
      @if (facade.loading()) {
        <span class="auth-form__spinner"></span>
      }
      {{ facade.registerLabels().submit }}
    </button>
  </form>

  <div class="auth-form__footer">
    <p>
      {{ facade.registerLabels().hasAccount }}
      <button type="button" class="auth-form__link" (click)="facade.goToLogin()">
        {{ facade.registerLabels().login }}
      </button>
    </p>
  </div>
</div>
