<!-- Hero Section -->
<section class="hero">
  <!-- Animated background blobs -->
  <div class="hero__bg">
    <div class="hero__blob hero__blob--1"></div>
    <div class="hero__blob hero__blob--2"></div>
    <div class="hero__blob hero__blob--3"></div>
  </div>

  <div class="container hero__content">
    <div class="hero__text">
      <p class="hero__greeting animate-fade-in-up">
        {{ ts.t()['hero_greeting'] }}
        <span class="text-accent">👋</span>
      </p>
      <h1 class="hero__name animate-fade-in-up">
        {{ ts.t()['hero_name'] }}
      </h1>
      <h2 class="hero__title animate-fade-in-up gradient-text">
        {{ ts.t()['hero_title'] }}
      </h2>
      <p class="hero__subtitle animate-fade-in-up">
        {{ ts.t()['hero_subtitle'] }}
      </p>

      <div class="hero__actions animate-fade-in-up">
        <a routerLink="/projects" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          {{ ts.t()['hero_cta_projects'] }}
        </a>
        <a routerLink="/about" class="btn-outline">
          {{ ts.t()['hero_cta_about'] }}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>

      <!-- Social Links -->
      @if (socialLinks().length > 0) {
        <app-social-links
          class="animate-fade-in-up"
          [links]="socialLinks()"
          context="hero"
        />
      }
    </div>

    <!-- Hero Avatar -->
    <div class="hero__avatar-wrapper animate-fade-in-up">
      <div class="hero__avatar">
        <div class="hero__avatar-inner" style="overflow: hidden;">
          <img src="profile picture.jpeg" alt="Hero Avatar" class="hero__avatar-img" />
        </div>
        <div class="hero__avatar-ring"></div>
      </div>

      <!-- Tech chips floating around avatar -->
      @for (chip of heroChips; track chip.label) {
        <div class="hero__chip" [class]="'hero__chip hero__chip--' + chip.variant">
          {{ chip.label }}
        </div>
      }
    </div>

  </div>

  <!-- Scroll indicator -->
  <div class="hero__scroll">
    <div class="hero__scroll-dot"></div>
  </div>
</section>
