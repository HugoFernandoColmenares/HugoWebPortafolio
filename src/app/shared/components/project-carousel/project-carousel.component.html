<section class="project-carousel">
  <div class="project-carousel__header">
    <h2 class="project-carousel__title">{{ title() }}</h2>
    <div class="project-carousel__nav">
      <button
        type="button"
        class="project-carousel__btn"
        (click)="scroll(-1)"
        aria-label="Previous projects"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <button
        type="button"
        class="project-carousel__btn"
        (click)="scroll(1)"
        aria-label="Next projects"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="project-carousel__track" #track>
    @for (project of projects(); track project.id) {
      <div class="project-carousel__slide">
        <app-project-card [project]="project" />
      </div>
    }
  </div>
</section>
