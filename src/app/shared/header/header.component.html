<header class="header">
  <div class="header__inner container">

    <!-- Logo / Name -->
    <a routerLink="/" class="header__logo">
      <span class="header__logo-bracket">&lt;</span>
      Hugo
      <span class="header__logo-dot gradient-text">.</span>dev
      <span class="header__logo-bracket">/&gt;</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="header__nav" aria-label="Main navigation">
      <a class="header__nav-link" routerLink="/" routerLinkActive="header__nav-link--active" [routerLinkActiveOptions]="{exact: true}">
        {{ ts.t()['nav_home'] }}
      </a>
      <a class="header__nav-link" routerLink="/projects" routerLinkActive="header__nav-link--active">
        {{ ts.t()['nav_projects'] }}
      </a>
      <a class="header__nav-link" routerLink="/about" routerLinkActive="header__nav-link--active">
        {{ ts.t()['nav_about'] }}
      </a>
    </nav>

    <!-- Actions -->
    <div class="header__actions">
      <app-language-toggle />

      <!-- Theme Toggle -->
      <button
        class="header__theme-btn"
        (click)="themeService.toggle()"
        [attr.aria-label]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (isDark) {
          <!-- Sun icon -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        }
      </button>

      <!-- Hamburger (mobile only) -->
      <button
        class="header__hamburger"
        (click)="toggleSidebar.emit()"
        aria-label="Open navigation menu"
        aria-expanded="false"
        id="hamburger-btn"
      >
        <span class="header__hamburger-line"></span>
        <span class="header__hamburger-line"></span>
        <span class="header__hamburger-line"></span>
      </button>
    </div>

  </div>
</header>
