<!-- Backdrop -->
@if (isOpen) {
  <div class="sidebar-backdrop" (click)="close.emit()" aria-hidden="true"></div>
}

<!-- Drawer -->
<aside class="sidebar" [class.sidebar--open]="isOpen" aria-label="Mobile navigation" [attr.aria-hidden]="!isOpen">
  <div class="sidebar__header">
    <span class="sidebar__logo">
      <span class="sidebar__logo-bracket">&lt;</span>Hugo<span class="sidebar__logo-dot gradient-text">.</span>dev<span class="sidebar__logo-bracket">/&gt;</span>
    </span>
    <button class="sidebar__close" (click)="close.emit()" aria-label="Close menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <nav class="sidebar__nav">
    <a
      class="sidebar__link"
      routerLink="/"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{exact: true}"
      (click)="close.emit()"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      {{ ts.t()['nav_home'] }}
    </a>
    <a
      class="sidebar__link"
      routerLink="/projects"
      routerLinkActive="sidebar__link--active"
      (click)="close.emit()"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      {{ ts.t()['nav_projects'] }}
    </a>
    <a
      class="sidebar__link"
      routerLink="/about"
      routerLinkActive="sidebar__link--active"
      (click)="close.emit()"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      {{ ts.t()['nav_about'] }}
    </a>
  </nav>

  <div class="sidebar__footer">
    <a href="https://github.com/HugoFernandoColmenares" target="_blank" rel="noopener" class="sidebar__social">GitHub</a>
    <a href="https://www.linkedin.com/in/hugofcolmenaresc/" target="_blank" rel="noopener" class="sidebar__social">LinkedIn</a>
  </div>
</aside>
